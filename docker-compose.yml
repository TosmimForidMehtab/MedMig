services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: trinetra
      POSTGRES_USER: trinetra
      POSTGRES_PASSWORD: trinetra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trinetra -d trinetra"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  model-init:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "scripts/download_models.py"]
    env_file:
      - .env
    environment:
      MODELS_DIR: /app/models
    volumes:
      - ./models:/app/models

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://trinetra:trinetra@postgres:5432/trinetra
    depends_on:
      postgres:
        condition: service_healthy
      model-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./uploads:/app/uploads
      - ./documents:/app/documents
      - ./outputs:/app/outputs
      - ./exports:/app/exports
    restart: unless-stopped

volumes:
  postgres_data:
